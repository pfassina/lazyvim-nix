name: Review Plugin Update PR

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  review:
    if: startsWith(github.head_ref, 'update-lazyvim-plugins')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review plugin update
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this LazyVim plugin update PR. Analyze the full diff and report:

            1. **Version**: What version is LazyVim being updated to?
            2. **Plugin changes**: Plugins added or removed, with count changes
            3. **Notable changes**: Event changes, source file restructuring, mapping updates
            4. **Extras consistency**: Whether extras.json matches upstream (check for missing extras from subdirectory restructuring like lang/typescript/)
            5. **Build artifacts**: Flag any new files that look like build artifacts and shouldn't be committed (e.g., verification reports, files with timestamps or CI runner paths)
            6. **Mappings**: Whether mappings.json changes are correct and verified
            7. **Unmapped plugins**: Count and status of unmapped plugins
            8. **Concerns**: Any issues that should be resolved before merging

            Post your findings as a single PR comment.
